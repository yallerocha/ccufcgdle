# Render Blueprint — Postgres + API Express em um clique.
# Dashboard → New → Blueprint → conecte o repo e aplique este arquivo.
# Depois defina CORS_ORIGIN manualmente com a URL da Vercel.

databases:
  - name: ccdle-db
    databaseName: ccdle
    user: ccdle
    plan: free

services:
  - type: web
    name: ccdle-api
    runtime: docker
    dockerfilePath: ./Dockerfile.api
    plan: free
    branch: main
    autoDeployTrigger: commit
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ccdle-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: ENSURE_DEFAULT_ADMIN
        value: "true"
      - key: SKIP_EMAIL_VERIFICATION
        sync: false
