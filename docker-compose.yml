services:
  db:
    image: postgres:15-alpine
    container_name: ccdle-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ccdle}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ccdle}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend Express standalone (API only)
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: ccdle-api
    restart: always
    ports:
      - "${API_PORT:-3001}:3001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-ccdle}?schema=public
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET nao definido. Copie .env.example para .env e defina um valor.}
      PORT: 3001
      # Origem do front liberada no CORS
      CORS_ORIGIN: http://localhost:${WEB_PORT:-3003}
      APP_URL: http://localhost:${WEB_PORT:-3003}
      ENSURE_DEFAULT_ADMIN: "true"
      ALLOW_LOCAL_SEED: "true"
      SEED_DATABASE: ${SEED_DATABASE:-false}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-LSD Game Hub <onboarding@resend.dev>}
    depends_on:
      db:
        condition: service_healthy

  # Frontend Next.js (UI only) — chama a API pelo browser via NEXT_PUBLIC_API_URL
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        # URL da API acessível pelo BROWSER (não o hostname interno do Docker)
        NEXT_PUBLIC_API_URL: http://localhost:${API_PORT:-3001}
    container_name: ccdle-web
    restart: always
    ports:
      - "${WEB_PORT:-3003}:3000"
    depends_on:
      - api

volumes:
  postgres_data:
