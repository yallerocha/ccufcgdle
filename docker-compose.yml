services:
  db:
    image: postgres:15-alpine
    container_name: ccdle-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ccdle}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ccdle}"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit
    container_name: ccdle-mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_WEB_PORT:-8025}:8025"
      - "${MAILPIT_SMTP_PORT:-1025}:1025"

  # Backend Express standalone (API only)
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: ccdle-api
    restart: always
    ports:
      - "${API_PORT:-3001}:3001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-ccdle}?schema=public
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET nao definido. Copie .env.example para .env e defina um valor.}
      PORT: 3001
      # Origem do front liberada no CORS. "*" por padrão para permitir acesso
      # de qualquer dispositivo na rede local (cada um acessa por um IP/host
      # diferente); defina um valor explícito no .env para restringir.
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      APP_URL: http://localhost:${WEB_PORT:-3003}
      ENSURE_DEFAULT_ADMIN: "true"
      ALLOW_LOCAL_SEED: "true"
      SEED_DATABASE: ${SEED_DATABASE:-false}
      SKIP_EMAIL_VERIFICATION: ${SKIP_EMAIL_VERIFICATION:-false}
      SMTP_URL: ${SMTP_URL:-}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-O Show da Computação <noreply@localhost>}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started

  # Frontend Next.js (UI only) — chama a API pelo browser usando o mesmo
  # host/IP da página + NEXT_PUBLIC_API_PORT (ver NEXT_PUBLIC_API_PORT abaixo)
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        # Porta da API; o host/IP é resolvido em tempo de execução no browser
        # a partir do endereço usado para abrir a página (funciona tanto em
        # localhost quanto acessando pelo IP da máquina na rede local).
        NEXT_PUBLIC_API_PORT: ${API_PORT:-3001}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
    container_name: ccdle-web
    restart: always
    ports:
      - "${WEB_PORT:-3003}:3000"
    depends_on:
      - api

volumes:
  postgres_data:
