# Railway — serviço da API (não o front Next.js; esse fica na Vercel).
# 1. Crie um projeto em railway.app e conecte este repositório.
# 2. Adicione um plugin PostgreSQL ao projeto.
# 3. Crie/edite o serviço da API apontando para este repo e confirme o Dockerfile.api.
# 4. Variáveis no serviço da API:
#    DATABASE_URL         = ${{Postgres.DATABASE_URL}}
#    JWT_SECRET           = (string longa aleatória)
#    CORS_ORIGIN          = https://seu-app.vercel.app
#    APP_URL              = https://seu-app.vercel.app
#    NODE_ENV             = production
#    ENSURE_DEFAULT_ADMIN = true
#    SKIP_EMAIL_VERIFICATION = true   (auto-verify @ufcg; no Resend needed for signup)
#    SKIP_EMAIL_VERIFICATION = false  (default — send real verification emails via Resend)
#    (Não defina SEED_DATABASE nem ALLOW_LOCAL_SEED — seed só roda no Docker local.)

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.api"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
