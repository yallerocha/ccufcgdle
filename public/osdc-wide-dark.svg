<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 348 64" role="img" aria-label="O Show da Computação">
  <defs>
    <radialGradient id="wCoin" cx="42%" cy="36%" r="72%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.45" stop-color="#dfe5ec"/>
      <stop offset="0.8" stop-color="#9aa4af"/>
      <stop offset="1" stop-color="#616c77"/>
    </radialGradient>
    <linearGradient id="wYellow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffbd0"/>
      <stop offset="0.45" stop-color="#ffd21a"/>
      <stop offset="1" stop-color="#f39a00"/>
    </linearGradient>
    <linearGradient id="wBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3448df"/>
      <stop offset="0.5" stop-color="#2334bd"/>
      <stop offset="1" stop-color="#151f8f"/>
    </linearGradient>
  </defs>

  <!-- coin peeking behind the banner -->
  <circle cx="28" cy="32" r="26" fill="#5c6772"/>
  <circle cx="28" cy="32" r="24" fill="url(#wCoin)"/>
  <circle cx="28" cy="32" r="19" fill="none" stroke="#7d8892" stroke-width="1.5"/>
  <g fill="none" stroke="#7a838d" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" opacity="0.6">
    <path d="M23 26 L18 32 L23 38"/>
    <path d="M33 26 L38 32 L33 38"/>
  </g>

  <!-- 3D banner -->
  <g transform="rotate(-4 174 32) skewX(-10)">
    <polygon points="342,15 347,20 347,56 342,51" fill="#131c86"/>
    <polygon points="36,51 342,51 347,56 41,56" fill="#0a1160"/>
    <rect x="36" y="15" width="306" height="36" rx="2" fill="url(#wBlue)" stroke="#4356e6" stroke-width="1.6"/>
    <rect x="36" y="15" width="306" height="5" rx="2" fill="#5063f0" opacity="0.9"/>
    <g font-family="'Arial Black','Archivo Black',Impact,sans-serif" font-weight="900" font-style="italic" font-size="24">
      <text x="50" y="43" fill="#835400">SHOW</text>
      <text x="49" y="42" fill="#a76d00">SHOW</text>
      <text x="48" y="41" fill="url(#wYellow)" stroke="#5a3800" stroke-width="0.9" paint-order="stroke">SHOW</text>
    </g>
    <text x="130" y="40" font-family="'Outfit','Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" font-style="italic" fill="#fff2a8">da</text>
    <g font-family="'Arial Black','Archivo Black',Impact,sans-serif" font-weight="900" font-style="italic" font-size="24">
      <text x="154" y="43" fill="#835400">COMPUTAÇÃO</text>
      <text x="153" y="42" fill="#a76d00">COMPUTAÇÃO</text>
      <text x="152" y="41" fill="url(#wYellow)" stroke="#5a3800" stroke-width="0.9" paint-order="stroke">COMPUTAÇÃO</text>
    </g>
  </g>
</svg>
