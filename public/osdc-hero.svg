<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 250" role="img" aria-label="O Show da Computação">
  <defs>
    <radialGradient id="coinS" cx="42%" cy="36%" r="72%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.42" stop-color="#dfe5ec"/>
      <stop offset="0.78" stop-color="#9aa4af"/>
      <stop offset="1" stop-color="#616c77"/>
    </radialGradient>
    <linearGradient id="yellowT" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffbd0"/>
      <stop offset="0.45" stop-color="#ffd21a"/>
      <stop offset="1" stop-color="#f39a00"/>
    </linearGradient>
    <linearGradient id="blueFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3448df"/>
      <stop offset="0.5" stop-color="#2334bd"/>
      <stop offset="1" stop-color="#151f8f"/>
    </linearGradient>
    <clipPath id="coinClip"><circle cx="230" cy="112" r="94"/></clipPath>
  </defs>

  <!-- ── Silver coin ─────────────────────────────────────────── -->
  <circle cx="230" cy="112" r="97" fill="#5c6772"/>
  <circle cx="230" cy="112" r="94" fill="url(#coinS)"/>
  <g clip-path="url(#coinClip)">
    <line id="sp" x1="230" y1="20" x2="230" y2="70" stroke="#8b95a0" stroke-width="1.6" opacity="0.5"/>
    <use href="#sp" transform="rotate(15 230 112)"/><use href="#sp" transform="rotate(30 230 112)"/>
    <use href="#sp" transform="rotate(45 230 112)"/><use href="#sp" transform="rotate(60 230 112)"/>
    <use href="#sp" transform="rotate(75 230 112)"/><use href="#sp" transform="rotate(90 230 112)"/>
    <use href="#sp" transform="rotate(105 230 112)"/><use href="#sp" transform="rotate(120 230 112)"/>
    <use href="#sp" transform="rotate(135 230 112)"/><use href="#sp" transform="rotate(150 230 112)"/>
    <use href="#sp" transform="rotate(165 230 112)"/><use href="#sp" transform="rotate(180 230 112)"/>
    <use href="#sp" transform="rotate(195 230 112)"/><use href="#sp" transform="rotate(210 230 112)"/>
    <use href="#sp" transform="rotate(225 230 112)"/><use href="#sp" transform="rotate(240 230 112)"/>
    <use href="#sp" transform="rotate(255 230 112)"/><use href="#sp" transform="rotate(270 230 112)"/>
    <use href="#sp" transform="rotate(285 230 112)"/><use href="#sp" transform="rotate(300 230 112)"/>
    <use href="#sp" transform="rotate(315 230 112)"/><use href="#sp" transform="rotate(330 230 112)"/>
    <use href="#sp" transform="rotate(345 230 112)"/>
  </g>
  <circle cx="230" cy="112" r="84" fill="none" stroke="#7d8892" stroke-width="2"/>
  <circle cx="230" cy="112" r="94" fill="none" stroke="#4c565f" stroke-width="5" stroke-dasharray="2.5 3" opacity="0.6"/>
  <g fill="none" stroke="#7a838d" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.55">
    <path d="M214 96 L200 112 L214 128"/>
    <path d="M246 96 L260 112 L246 128"/>
    <path d="M222 132 L238 92"/>
  </g>

  <!-- ── Bottom banner: "da COMPUTAÇÃO" (3D slab) ────────────── -->
  <g transform="rotate(7 230 160) skewX(-12)">
    <!-- extrusion faces -->
    <polygon points="426,145 434,154 434,206 426,197" fill="#131c86"/>
    <polygon points="66,197 426,197 434,206 74,206" fill="#0a1160"/>
    <!-- front face -->
    <rect x="66" y="145" width="360" height="52" rx="3" fill="url(#blueFace)" stroke="#4356e6" stroke-width="2"/>
    <rect x="66" y="145" width="360" height="7" rx="3" fill="#5063f0" opacity="0.9"/>
    <text x="120" y="182" font-family="'Outfit','Segoe UI',Arial,sans-serif" font-size="18" font-weight="700" font-style="italic" fill="#fff2a8">da</text>
    <!-- 3D extruded lettering -->
    <g font-family="'Arial Black','Archivo Black',Impact,sans-serif" font-weight="900" font-style="italic" text-anchor="middle" font-size="36">
      <text x="287" y="188" fill="#5f3c00" textLength="278" lengthAdjust="spacingAndGlyphs">COMPUTAÇÃO</text>
      <text x="286" y="187" fill="#714800" textLength="278" lengthAdjust="spacingAndGlyphs">COMPUTAÇÃO</text>
      <text x="285" y="186" fill="#835400" textLength="278" lengthAdjust="spacingAndGlyphs">COMPUTAÇÃO</text>
      <text x="284" y="185" fill="#956100" textLength="278" lengthAdjust="spacingAndGlyphs">COMPUTAÇÃO</text>
      <text x="283.5" y="184.5" fill="#a76d00" textLength="278" lengthAdjust="spacingAndGlyphs">COMPUTAÇÃO</text>
      <text x="283" y="184" fill="url(#yellowT)" stroke="#5a3800" stroke-width="1.1" paint-order="stroke" textLength="278" lengthAdjust="spacingAndGlyphs">COMPUTAÇÃO</text>
    </g>
  </g>

  <!-- ── Top banner: "O SHOW" (3D slab) ──────────────────────── -->
  <g transform="rotate(-8 210 84) skewX(-12)">
    <polygon points="386,50 395,60 395,120 386,110" fill="#131c86"/>
    <polygon points="56,110 386,110 395,120 65,120" fill="#0a1160"/>
    <rect x="56" y="50" width="330" height="60" rx="3" fill="url(#blueFace)" stroke="#4356e6" stroke-width="2"/>
    <rect x="56" y="50" width="330" height="8" rx="3" fill="#5063f0" opacity="0.9"/>
    <text x="94" y="96" font-family="'Outfit','Segoe UI',Arial,sans-serif" font-size="20" font-weight="800" font-style="italic" fill="#fff2a8">O</text>
    <g font-family="'Arial Black','Archivo Black',Impact,sans-serif" font-weight="900" font-style="italic" text-anchor="middle" font-size="62">
      <text x="238" y="103" fill="#5f3c00">SHOW</text>
      <text x="237" y="102" fill="#714800">SHOW</text>
      <text x="236" y="101" fill="#835400">SHOW</text>
      <text x="235" y="100" fill="#956100">SHOW</text>
      <text x="234" y="99" fill="#a76d00">SHOW</text>
      <text x="233" y="98" fill="url(#yellowT)" stroke="#5a3800" stroke-width="1.4" paint-order="stroke">SHOW</text>
    </g>
  </g>

  <!-- ── Sparkles ────────────────────────────────────────────── -->
  <path d="M120 42 l2.2 8 8 2.2 -8 2.2 -2.2 8 -2.2 -8 -8 -2.2 8 -2.2z" fill="#ffffff"/>
  <path d="M348 178 l1.6 5.8 5.8 1.6 -5.8 1.6 -1.6 5.8 -1.6 -5.8 -5.8 -1.6 5.8 -1.6z" fill="#ffffff" opacity="0.9"/>
  <path d="M312 34 l1.2 4.4 4.4 1.2 -4.4 1.2 -1.2 4.4 -1.2 -4.4 -4.4 -1.2 4.4 -1.2z" fill="#ffffff" opacity="0.75"/>
</svg>
